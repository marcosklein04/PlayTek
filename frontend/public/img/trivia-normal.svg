<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Trivia Normal</title>
  <desc id="desc">Portada colorida para la trivia clasica con marco brillante, tablero central y estilo de juego familiar.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#103fc8" />
      <stop offset="35%" stop-color="#0ea5e9" />
      <stop offset="68%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde047" />
      <stop offset="50%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#facc15" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10214c" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="tablet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#173472" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="titleFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="25%" stop-color="#facc15" />
      <stop offset="50%" stop-color="#60a5fa" />
      <stop offset="75%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="confetti" width="160" height="160" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="18" r="8" fill="#facc15" />
      <circle cx="82" cy="36" r="7" fill="#fb7185" />
      <circle cx="136" cy="20" r="8" fill="#34d399" />
      <rect x="35" y="72" width="46" height="12" rx="6" fill="#f97316" transform="rotate(-24 58 78)" />
      <rect x="100" y="92" width="34" height="10" rx="5" fill="#60a5fa" transform="rotate(18 117 97)" />
      <path d="M18 126 l12 -18 l12 18 l-12 18z" fill="#c084fc" />
      <path d="M132 132 c10 -18 24 -18 34 0" fill="none" stroke="#fef08a" stroke-width="5" stroke-linecap="round" />
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#confetti)" opacity="0.5" />

