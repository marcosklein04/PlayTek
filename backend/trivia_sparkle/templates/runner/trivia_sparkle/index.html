{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trivia Sparkle</title>
    <meta name="description" content="Trivia Sparkle" />
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" type="image/x-icon" href="{% static 'trivia_sparkle/favicon.ico' %}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      .trivia-sparkle-watermark {
        position: fixed;
        z-index: 9999;
        pointer-events: none;
        user-select: none;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-weight: 900;
        white-space: nowrap;
        transform-origin: center;
      }
    </style>
    <link rel="stylesheet" crossorigin href="{% static 'trivia_sparkle/assets/index-FG9EpZ7h.css' %}" />
    <script type="module" crossorigin src="{% static 'trivia_sparkle/assets/index-B0yfuUL9.js' %}"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (async function applyRunnerWatermark() {
        const cleanPath = window.location.pathname.replace(/\/+$/, "");
        if (cleanPath.endsWith("/admin")) return;

        try {
          const response = await fetch("/api/trivia-sparkle/config", { credentials: "same-origin" });
          if (!response.ok) return;

          const payload = await response.json();
          const previewMode = !!payload.preview_mode;
          const watermark = payload.watermark || {};
          if (!previewMode || watermark.enabled === false) return;

          const el = document.createElement("div");
          el.className = "trivia-sparkle-watermark";
          el.textContent = String(watermark.text || "MODO PRUEBA");
          el.style.color = String(watermark.color || "#ff0000");
          el.style.opacity = String(Number.isFinite(Number(watermark.opacity)) ? Number(watermark.opacity) : 0.28);
          el.style.fontSize = `${Number.isFinite(Number(watermark.font_size)) ? Number(watermark.font_size) : 96}px`;

          const position = String(watermark.position || "center");
          if (position === "top-left") {
            el.style.top = "16px";
            el.style.left = "16px";
          } else if (position === "top-right") {
            el.style.top = "16px";
            el.style.right = "16px";
          } else if (position === "bottom-left") {
            el.style.bottom = "16px";
            el.style.left = "16px";
          } else if (position === "bottom-right") {
            el.style.bottom = "16px";
            el.style.right = "16px";
          } else {
            el.style.top = "50%";
            el.style.left = "50%";
            el.style.transform = "translate(-50%, -50%) rotate(-24deg)";
          }

          document.body.appendChild(el);
        } catch (_error) {
          // no-op
        }
      })();
    </script>
  </body>
</html>
